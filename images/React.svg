<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0b1536"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>

    <!-- Node Gradients -->
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#007db8"/>
    </linearGradient>
    
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Marker for Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 7 5 L 0 8 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <style>
    /* Typography */
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; fill: #ffffff; font-size: 17px; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; fill: #4b5563; font-size: 11px; letter-spacing: 0.5px; }
    
    /* Static Paths */
    .base-path { stroke: #1e3a8a; stroke-width: 2; fill: none; stroke-linejoin: round; }
    
    /* Dynamic Flow Animation */
    .flow-line {
      stroke: #38bdf8;
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 12 80; /* Length of glow particle vs gap */
      animation: flow-animation 3s linear infinite;
    }
    
    /* Fast-track variant for variety */
    .flow-line-fast {
      animation-duration: 2.2s;
    }

    @keyframes flow-animation {
      from { stroke-dashoffset: 92; }
      to { stroke-dashoffset: 0; }
    }

    /* React Pulse Pulse Effect */
    .react-node {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: 300px 95px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); filter: drop-shadow(0 0 12px rgba(0, 216, 255, 0.4)); }
    }
  </style>

  <!-- Dark Background -->
  <rect width="100%" height="100%" fill="url(#bgGlow)" />

  <!-- ================= DEFINED PATHS FOR FLOW ================= -->
  <!-- Left Flow: React -> FastAPI -> Postgres -->
  <path id="path-left" d="M 300,125 L 300,160 L 160,160 L 160,210 M 160,285 L 160,330 L 300,330 L 300,375" class="base-path" marker-end="url(#arrow)" />
  
  <!-- Right Flow: React -> Node.js -> Postgres -->
  <path id="path-right" d="M 300,125 L 300,160 L 440,160 L 440,210 M 440,285 L 440,330 L 300,330 L 300,375" class="base-path" marker-end="url(#arrow)" />


  <!-- ================= ANIMATED FLOW OVERLAYS ================= -->
  <!-- Glowing particles moving along the exact same paths -->
  <path d="M 300,125 L 300,160 L 160,160 L 160,210 M 160,285 L 160,330 L 300,330 L 300,375" class="flow-line" filter="url(#glow)" />
  <path d="M 300,125 L 300,160 L 440,160 L 440,210 M 440,285 L 440,330 L 300,330 L 300,375" class="flow-line flow-line-fast" filter="url(#glow)" />


  <!-- ================= NODES (CARDS) ================= -->

  <!-- REACT (Top/Frontend with pulse) -->
  <g class="react-node" filter="url(#shadow)">
    <!-- Positioning helper box shifted to center around origin point -->
    <g transform="translate(210, 65)">
      <rect width="180" height="60" rx="12" fill="url(#nodeGrad)" stroke="#00d8ff" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle" class="title" fill="url(#reactGrad)">React</text>
      <text x="90" y="49" text-anchor="middle" class="subtitle">FRONTEND</text>
    </g>
  </g>

  <!-- FASTAPI (Middle Left) -->
  <g transform="translate(70, 220)" filter="url(#shadow)">
    <rect width="180" height="65" rx="10" fill="url(#nodeGrad)" stroke="#1e40af" stroke-width="1.5"/>
    <text x="90" y="35" text-anchor="middle" class="title">FastAPI</text>
    <text x="90" y="52" text-anchor="middle" class="subtitle">PYTHON API</text>
  </g>

  <!-- NODE.JS (Middle Right) -->
  <g transform="translate(350, 220)" filter="url(#shadow)">
    <rect width="180" height="65" rx="10" fill="url(#nodeGrad)" stroke="#1e40af" stroke-width="1.5"/>
    <text x="90" y="35" text-anchor="middle" class="title">Node.js</text>
    <text x="90" y="52" text-anchor="middle" class="subtitle">BACKEND SERVICE</text>
  </g>

  <!-- POSTGRESQL (Bottom/Database) -->
  <g transform="translate(210, 385)" filter="url(#shadow)">
    <rect width="180" height="60" rx="12" fill="url(#nodeGrad)" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="32" text-anchor="middle" class="title" fill="#e2e8f0">PostgreSQL</text>
    <text x="90" y="48" text-anchor="middle" class="subtitle">DATABASE</text>
  </g>

</svg>
