<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0a0b12" rx="8" />

  <g transform="translate(15, 15)">
    <rect width="370" height="120" rx="6" fill="#030712" stroke="#1f2937" stroke-width="1.5"/>
    
    <rect width="370" height="20" rx="6" fill="#111827"/>
    <circle cx="12" cy="10" r="3.5" fill="#ef4444"/>
    <circle cx="24" cy="10" r="3.5" fill="#f59e0b"/>
    <circle cx="36" cy="10" r="3.5" fill="#22c55e"/>
    
    <g transform="translate(12, 35)" font-family="Courier New, Courier, monospace" font-size="13px" fill="#ffffff">
      
      <text x="0" y="12"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan></text>

      <g visibility="hidden">
        <animate attributeName="visibility" from="hidden" to="visible" begin="0s" dur="9s" repeatCount="indefinite" fill="freeze"/>
        <text x="0" y="12"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan><tspan fill="#ffffff">npm run build</tspan></text>
        <text x="0" y="32"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan></text>
      </g>
      
      <g visibility="hidden">
        <animate attributeName="visibility" from="hidden" to="visible" begin="3s" dur="9s" repeatCount="indefinite" fill="freeze"/>
        <text x="0" y="32"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan><tspan fill="#ffffff">docker compose up</tspan></text>
        <text x="0" y="52"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan></text>
      </g>
      
      <g visibility="hidden">
        <animate attributeName="visibility" from="hidden" to="visible" begin="6s" dur="9s" repeatCount="indefinite" fill="freeze"/>
        <text x="0" y="52"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan><tspan fill="#ffffff">git push origin main</tspan></text>
        <text x="0" y="72"><tspan fill="#38bdf8" font-weight="bold">aditya@github:~$ </tspan></text>
      </g>

      <rect width="7" height="12" fill="#00d8ff">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="x" values="125;125;225;225;255;255;270;270" keyTimes="0;0.05;0.33;0.38;0.66;0.71;0.95;1" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;2;22;22;42;42;62;62" keyTimes="0;0.05;0.33;0.38;0.66;0.71;0.95;1" dur="9s" repeatCount="indefinite"/>
      </rect>

    </g>
  </g>
</svg>
