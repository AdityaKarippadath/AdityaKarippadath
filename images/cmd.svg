<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="100%" height="100%">
  <defs>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feFlood flood-color="#00d8ff" flood-opacity="0.25" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow" />
      <feComposite in="SourceGraphic" in2="softGlow" operator="over" />
    </filter>
    
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <style>
    /* Terminal Text Base */
    .term-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      fill: #ffffff;
    }
    
    /* Username & Prompt Color */
    .term-prompt { fill: #38bdf8; font-weight: bold; }
    .term-cmd { fill: #ffffff; }

    /* Hidden Lines before Animation Step */
    .term-line { visibility: hidden; }

    /* Line Appearance Keyframes */
    .term-line-1 { animation: type-1 9s step-end infinite; }
    .term-line-2 { animation: type-2 9s step-end infinite; }
    .term-line-3 { animation: type-3 9s step-end infinite; }

    /* Blinking Cursor Core Animation */
    .cursor {
      fill: #00d8ff;
      visibility: visible;
      animation: blink 0.8s step-end infinite, cursor-pos 9s step-end infinite;
    }

    @keyframes blink { 50% { visibility: hidden; } }

    /* Sequence timelines for typing text */
    @keyframes type-1 { 
      0%, 11% { visibility: hidden; } 
      12%, 100% { visibility: visible; } 
    }
    @keyframes type-2 { 
      0%, 44% { visibility: hidden; } 
      45%, 100% { visibility: visible; } 
    }
    @keyframes type-3 { 
      0%, 77% { visibility: hidden; } 
      78%, 100% { visibility: visible; } 
    }
    
    /* Vertical cursor steps shifted right to clear the prompt dynamically */
    @keyframes cursor-pos {
      0% { x: 125; y: 2; visibility: visible; } 
      11% { x: 125; y: 2; visibility: hidden; } 
      12% { x: 160; y: 22; visibility: visible; } 
      44% { x: 160; y: 22; visibility: hidden; } 
      45% { x: 175; y: 42; visibility: visible; } 
      77% { x: 175; y: 42; visibility: hidden; } 
      78% { x: 125; y: 62; visibility: visible; } 
      100% { x: 125; y: 62; visibility: visible; } 
    }
  </style>

  <rect width="100%" height="100%" fill="#0a0b12" rx="8" />

  <g transform="translate(15, 15)" filter="url(#windowShadow)">
    <rect width="370" height="120" rx="6" fill="#030712" stroke="#1f2937" stroke-width="1.5"/>
    
    <rect width="370" height="20" rx="6" fill="#111827"/>
    <circle cx="12" cy="10" r="3.5" fill="#ef4444"/>
    <circle cx="24" cy="10" r="3.5" fill="#f59e0b"/>
    <circle cx="36" cy="10" r="3.5" fill="#22c55e"/>
    
    <g transform="translate(12, 35)" class="term-text" filter="url(#textGlow)">
      
      <text x="0" y="12"><tspan class="term-prompt">aditya@github:~$ </tspan></text>
      
      <rect width="7" height="12" class="cursor" />

      <g class="term-line term-line-1">
        <text x="0" y="12"><tspan class="term-prompt">aditya@github:~$ </tspan><tspan class="term-cmd">npm run build</tspan></text>
        <text x="0" y="32"><tspan class="term-prompt">aditya@github:~$ </tspan></text>
      </g>
      
      <g class="term-line term-line-2">
        <text x="0" y="32"><tspan class="term-prompt">aditya@github:~$ </tspan><tspan class="term-cmd">docker compose up</tspan></text>
        <text x="0" y="52"><tspan class="term-prompt">aditya@github:~$ </tspan></text>
      </g>
      
      <g class="term-line term-line-3">
        <text x="0" y="52"><tspan class="term-prompt">aditya@github:~$ </tspan><tspan class="term-cmd">git push origin main</tspan></text>
        <text x="0" y="72"><tspan class="term-prompt">aditya@github:~$ </tspan></text>
      </g>
    </g>
  </g>
</svg>
