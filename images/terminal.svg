<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .terminal-body { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 14px; }
    .bold { font-weight: bold; }
    
    /* Syntax Highlighting Colors */
    .user { fill: #58a6ff; }
    .host { fill: #7ee787; }
    .accent { fill: #ff7b72; }
    .text-main { fill: #c9d1d9; }
    .text-muted { fill: #8b949e; }
    .text-yellow { fill: #d2a8ff; }
    .text-cyan { fill: #a5d6ff; }
    
    /* Typing animation simulation delays */
    .line { animation: fadeIn 0.5s ease-forward; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="10"/>

  <g filter="url(#dropShadow)">
    <rect x="25" y="25" width="450" height="290" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5" />
    
    <path d="M 25 33 A 8 8 0 0 1 33 25 L 467 25 A 8 8 0 0 1 475 33 L 475 60 L 25 60 Z" fill="url(#headerGrad)" stroke="#30363d" stroke-width="1.5" />
    <line x1="25" y1="60" x2="475" y2="60" stroke="#30363d" stroke-width="1" />

    <circle cx="45" cy="42" r="6" fill="#f85149" />
    <circle cx="65" cy="42" r="6" fill="#f0883e" />
    <circle cx="85" cy="42" r="6" fill="#7ee787" />
    
    <text x="250" y="46" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">bash — aditya@github:~</text>
  </g>

  <g class="terminal-body" transform="translate(45, 90)">
    <text x="0" y="0" class="bold">
      <tspan class="accent">⚡ </tspan>
      <tspan class="user">aditya</tspan><tspan class="text-muted">@</tspan><tspan class="host">github</tspan>
    </text>
    
    <text x="0" y="22" class="text-muted">----------------------------------</text>
    
    <g transform="translate(0, 50)">
      <text x="0" y="0">💻</text>
      <text x="30" y="0" class="text-main bold">Full Stack Developer</text>
    </g>

    <g transform="translate(0, 78)">
      <text x="0" y="0">🚀</text>
      <text x="30" y="0" class="text-cyan">MERN <tspan class="text-muted">+</tspan> FastAPI</text>
    </g>

    <g transform="translate(0, 106)">
      <text x="0" y="0">🗄️</text>
      <text x="30" y="0" class="text-yellow">PostgreSQL <tspan class="text-muted">&amp;</tspan> MongoDB</text>
    </g>

    <g transform="translate(0, 134)">
      <text x="0" y="0">🌱</text>
      <text x="30" y="0" class="text-main">Building SaaS Products</text>
    </g>

    <g transform="translate(0, 162)">
      <text x="0" y="0">📍</text>
      <text x="30" y="0" class="text-muted">India</text>
    </g>
    
    <g transform="translate(0, 195)">
      <text x="0" y="0" class="bold">
        <tspan class="user">aditya</tspan><tspan class="text-muted">:~#</tspan> <tspan class="text-main">■</tspan>
      </text>
    </g>
  </g>
</svg>
