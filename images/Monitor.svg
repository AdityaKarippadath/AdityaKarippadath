<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 195" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0a0b12" rx="8" />

  <g transform="translate(15, 15)">
    <rect width="370" height="165" rx="6" fill="#030712" stroke="#1f2937" stroke-width="1.5"/>
    
    <rect width="370" height="22" rx="6" fill="#111827"/>
    <circle cx="12" cy="11" r="3.5" fill="#ef4444"/>
    <circle cx="24" cy="11" r="3.5" fill="#f59e0b"/>
    <circle cx="36" cy="11" r="3.5" fill="#22c55e"/>
    
    <text x="185" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11px" fill="#9ca3af" text-anchor="middle" font-weight="bold"> System Monitor</text>
    
    <g transform="translate(15, 45)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13px" fill="#ffffff">
      
      <g transform="translate(0, 12)">
        <text x="0" y="0" fill="#9ca3af">CPU Usage   </text>
        
        <g opacity="1">
          <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.33;0.66;1" dur="4s" repeatCount="indefinite"/>
          <text x="110" y="0" fill="#38bdf8" font-weight="bold">███████░ 72%</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.33;0.66;1" dur="4s" repeatCount="indefinite"/>
          <text x="110" y="0" fill="#ef4444" font-weight="bold">████████ 85%</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.33;0.66;1" dur="4s" repeatCount="indefinite"/>
          <text x="110" y="0" fill="#22c55e" font-weight="bold">██████░░ 61%</text>
        </g>
      </g>
      
      <g transform="translate(0, 34)">
        <text x="0" y="0" fill="#9ca3af">RAM Usage   </text>
        
        <g opacity="1">
          <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.4;0.8;1" dur="5s" repeatCount="indefinite"/>
          <text x="110" y="0" fill="#38bdf8" font-weight="bold">██████░░ 65%</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.4;0.8;1" dur="5s" repeatCount="indefinite"/>
          <text x="110" y="0" fill="#38bdf8" font-weight="bold">███████░ 70%</text>
        </g>
      </g>
      
      <line x1="0" y1="48" x2="340" y2="48" stroke="#1f2937" stroke-width="1" stroke-dasharray="4 4" />

      <g transform="translate(0, 68)">
        <text x="0" y="0" fill="#9ca3af">Backend API </text>
        <text x="125" y="0" fill="#22c55e" font-weight="bold">ONLINE</text>
        <circle cx="185" cy="-4" r="3" fill="#22c55e">
          <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <g transform="translate(0, 88)">
        <text x="0" y="0" fill="#9ca3af">Database    </text>
        <text x="125" y="0" fill="#38bdf8" font-weight="bold">CONNECTED</text>
      </g>
      
      <g transform="translate(0, 108)">
        <text x="0" y="0" fill="#9ca3af">Frontend    </text>
        <text x="125" y="0" fill="#a855f7" font-weight="bold">RUNNING</text>
      </g>

    </g>
  </g>
</svg>
